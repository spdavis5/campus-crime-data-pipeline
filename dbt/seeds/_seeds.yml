version: 2

seeds:
  - name: academic_calendar
    description: >
      BYU academic-calendar periods used to enrich dim_date. One row per period
      with an inclusive [start_date, end_date] range. period_type is one of
      SEMESTER, FINALS, BREAK, or GAME_DAY (single-day rows use the same start
      and end date).

      Populated from BYU's official academic calendar for 2022-2026: semester
      bounds (start of classes -> end of final exams), final-exam windows, and
      breaks (between-term gaps, Thanksgiving/Christmas, and no-class holidays).
      GAME_DAY rows are BYU home football games (2022-2025 seasons, sourced from
      the published schedules), which drive the game-day analysis; the neutral-site
      bowl game is excluded. The date coverage spans the full range of scraped
      incident data so every day carries its academic-calendar context.
    columns:
      - name: period_type
        data_tests:
          - accepted_values:
              values: [SEMESTER, FINALS, BREAK, GAME_DAY]
      - name: start_date
        data_tests: [not_null]
      - name: end_date
        data_tests: [not_null]
