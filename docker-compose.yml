# Local data platform. Every service runs in a container; nothing runs on the host.
# More services (postgres, airflow, streamlit) will be added as the pipeline grows.
# Today: the MongoDB raw landing zone, the scraper, a local Ollama model, and the
# location classifier.
#
#   docker compose up -d mongodb ollama              # start the stores + model
#   docker compose run --rm scraper --max-pages 3    # scrape into the raw store
#   docker compose run --rm classifier               # classify unclassified incidents
#
# On first `up`, the ollama-pull sidecar downloads the model into a named volume so
# the classifier works from a clean checkout. The scraper and classifier are in the
# "jobs" profile so `docker compose up` starts only the long-running services, not
# the batch jobs.

# Shared config for the Airflow services (webserver, scheduler, init). Runs as
# root so the mounted Docker socket is accessible for DockerOperator, and points
# PIPELINE_NETWORK at the compose network so spawned job containers reach the
# stores by name. All Airflow services are behind the "airflow" profile.
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  image: byu-police-airflow
  profiles: ["airflow"]
  user: "0:0"
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__WEBSERVER__SECRET_KEY: "campus-safety-local"
    PIPELINE_NETWORK: campus-crime-data-pipeline_default
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    airflow-postgres:
      condition: service_healthy

services:
  mongodb:
    image: mongo:7
    container_name: byu-police-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: byu-police-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: pull the model into the ollama volume, then exit. The classifier
  # waits on this completing so the model is guaranteed present before it runs.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    # Share the ollama container's network namespace so the pull talks to it over
    # localhost — no cross-container DNS to depend on.
    network_mode: "service:ollama"
    environment:
      OLLAMA_HOST: http://localhost:11434
    entrypoint: ["/bin/sh", "-c", "ollama pull ${OLLAMA_MODEL:-llama3.2:3b}"]
    restart: "no"

  postgres:
    image: postgres:16
    container_name: byu-police-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: byu_police_beat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d byu_police_beat"]
      interval: 10s
      timeout: 5s
      retries: 5

  scraper:
    build: .
    image: byu-police-scraper
    container_name: byu-police-scraper
    profiles: ["jobs"]
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: byu_police_beat

  classifier:
    build:
      context: .
      dockerfile: Dockerfile.classifier
    image: byu-police-classifier
    container_name: byu-police-classifier
    profiles: ["jobs"]
    depends_on:
      mongodb:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: byu_police_beat
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:3b}

  normalizer:
    build:
      context: .
      dockerfile: Dockerfile.normalizer
    image: byu-police-normalizer
    container_name: byu-police-normalizer
    profiles: ["jobs"]
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: byu_police_beat
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: byu_police_beat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  dbt:
    build:
      context: .
      dockerfile: Dockerfile.dbt
    image: byu-police-dbt
    container_name: byu-police-dbt
    profiles: ["jobs"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: byu_police_beat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: byu-police-dashboard
    container_name: byu-police-dashboard
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: byu_police_beat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Airflow (opt-in: docker compose --profile airflow up -d) ---------------
  airflow-postgres:
    image: postgres:16
    container_name: byu-police-airflow-db
    profiles: ["airflow"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: migrate the metadata DB and create the admin user, then exit.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin \
          --firstname Admin --lastname User --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: byu-police-airflow-scheduler
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-webserver:
    <<: *airflow-common
    container_name: byu-police-airflow-web
    command: webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mongo_data:
  ollama_data:
  postgres_data:
  airflow_db_data:
